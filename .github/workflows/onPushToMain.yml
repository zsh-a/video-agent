name: main

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Verify media tools
        run: |
          ffmpeg -version
          ffprobe -version
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test
